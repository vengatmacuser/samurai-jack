comments:
  active: true
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  EndOfLineComment:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

complexity:
  active: true
  CognitiveComplexity:
    threshold: 15
  CyclomaticComplexity:
    threshold: 10
  LongMethod:
    threshold: 60
  LongParameterList:
    threshold: 6
  NestedBlockDepth:
    threshold: 4
  TooManyFunctions:
    thresholdInClasses: 11
    thresholdInInterfaces: 8
    thresholdInObjects: 7

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true

exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
  InstanceOfCheckForException:
    active: true
  NotImplementedDeclaration:
    active: true
  ObjectExtendsThrowable:
    active: true
  PrintStackTrace:
    active: true
  RethrowCaughtException:
    active: true
  ReturnFromFinally:
    active: true
  SwallowedException:
    active: false
  ThrowingExceptionFromFinally:
    active: true
  ThrowingExceptionInMain:
    active: false
  TooGenericExceptionCaught:
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - Exception
      - IllegalMonitorStateException
      - NullPointerException
      - RuntimeException
      - Throwable
  TooGenericExceptionThrown:
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable

formatting:
  active: true
  autoCorrect: false
  AnnotationOnSeparateLine:
    active: true
  ChainWrapping:
    active: true
  Filename:
    active: true
  FinalNewline:
    active: true
    autoCorrect: true
  ImportOrdering:
    active: true
  Indentation:
    active: true
  MaximumLineLength:
    maxLineLength: 120
  NoBlankLineBeforeRbrace:
    active: true
  NoConsecutiveBlankLines:
    active: true
  NoEmptyClassBody:
    active: true
  NoMultipleSpaces:
    active: true
  PackageName:
    active: true
  ParameterListWrapping:
    active: true
  SpacingAroundColon:
    active: true
  SpacingAroundComma:
    active: true

naming:
  active: true
  ClassNaming:
    classPattern: '[A-Z][a-zA-Z0-9]*'
  EnumNaming:
    enumPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
  FunctionParameterNaming:
    parameterPattern: '[a-z][a-zA-Z0-9]*'
  ObjectPropertyNaming:
    propertyPattern: '[a-z][a-zA-Z0-9]*'
  PrivatePropertyNaming:
    privatePropertyPattern: '(_)?[a-z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Z0-9]*(_[A-Z0-9]+)*'
    propertyPattern: '[a-z][a-zA-Z0-9]*'
  VariableNaming:
    variablePattern: '[a-z][a-zA-Z0-9]*'

performance:
  active: true
  ArrayPrimitive:
    active: true
  CouldBeSequence:
    threshold: 2
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: true
  UnnecessaryTemporaryInstantiation:
    active: true

